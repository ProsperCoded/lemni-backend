components:
  schemas: {}
  securitySchemes:
    bearer:
      bearerFormat: JWT
      scheme: bearer
      type: http
info:
  contact: {}
  description: Deterministic, highly resilient backend infrastructure for the Lemni Payment-as-a-Service (PaaS) engine.
  title: LEMNI PaaS Core Engine API
  version: 1.0.0
openapi: 3.0.0
paths:
  /:
    get:
      operationId: AppController_getHello
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - developer-apis/health
  /admin/api-keys/{id}:
    delete:
      description: Marks the specified API key as inactive immediately, blocking any subsequent API requests using it.
      operationId: AuthController_revokeKey
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: API key successfully revoked
        '401':
          description: Unauthorized JWT session token
        '404':
          description: API key not found or does not belong to the merchant
      security:
        - bearer: []
      summary: Revoke an API key
      tags:
        - merchant-dashboard/api-keys
  /admin/customers:
    post:
      description: Registers a customer under the current merchant, preparing them for subscription charges.
      operationId: BillingController_registerCustomer
      parameters: []
      responses:
        '201':
          description: Customer successfully registered
        '401':
          description: Unauthorized JWT session token
      security:
        - bearer: []
      summary: Register a customer
      tags:
        - merchant-dashboard/customers
  /admin/plans:
    post:
      description: Registers a new recurring or one-time subscription plan in the system.
      operationId: BillingController_createPlan
      parameters: []
      responses:
        '201':
          description: Plan successfully created
        '401':
          description: Unauthorized JWT session token
      security:
        - bearer: []
      summary: Create a billing plan
      tags:
        - merchant-dashboard/plans
  /admin/plans/{id}:
    delete:
      description: Removes a subscription plan if no active or trialing customers are attached to it.
      operationId: BillingController_deletePlan
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '240':
          description: Plan successfully deleted
        '400':
          description: Cannot delete plan due to active subscriptions
        '401':
          description: Unauthorized JWT session token
        '404':
          description: Plan not found
      security:
        - bearer: []
      summary: Delete a billing plan
      tags:
        - merchant-dashboard/plans
  /admin/subscriptions/{id}/reactivate:
    post:
      description: Resets the billing cycle start date and shifts the subscription back to active status.
      operationId: BillingController_reactivateSubscription
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subscription successfully reactivated
        '400':
          description: Subscription is not canceled or card is missing
        '401':
          description: Unauthorized JWT session token
        '404':
          description: Subscription or associated plan not found
      security:
        - bearer: []
      summary: Reactivate a canceled subscription
      tags:
        - merchant-dashboard/subscriptions
  /api/v1/checkout/plans/{planId}/sessions:
    post:
      description: |
        Initializes a checkout session via a public plan link. This flow is used to register a customer using an off-the-shelf payment page.

        **Sequence Flow & Redirect Hops:**
        1. **Form #1 (Email Input Form on the Frontend):** The customer loads the public plan link on the frontend website. The frontend displays **Form #1** requesting the customer's email address. Once the customer inputs their email and submits the form, the frontend calls this endpoint (`POST /api/v1/checkout/plans/{planId}/sessions`) containing the email and the plan ID.
        2. **Session Creation:** The server initializes a checkout session, mapping the customer's email and the specific plan.
        3. **Form #2 (Nomba Card/Payment Form Redirect):** The endpoint returns a checkout session URL. The frontend redirects the user's browser to this URL, which displays **Form #2** (Nomba's secure card/payment form).
        4. **Redirect / Callback Resolution:** After completing or canceling the payment on **Form #2**, the user is redirected back:
           - If a `callbackUrl` was provided in the request payload or metadata, the browser is redirected to that specific URL.
           - If no `callbackUrl` is provided, the system falls back to the merchant's configured `defaultRedirectUrl` to route the customer back to the merchant dashboard or website.
      operationId: CheckoutController_createPublicPlanSession
      parameters:
        - description: The static pricing plan ID
          in: path
          name: planId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Checkout session generated
        '404':
          description: Plan not found
      summary: Generate public plan checkout session
      tags:
        - developer-apis/checkout
  /api/v1/pay:
    post:
      description: |
        Generates a checkout session URL for a single, one-time payment charge.

        **Sequence Flow & Redirect Hops:**
        1. **API Trigger:** The merchant's backend or frontend application calls this endpoint to initiate a charge.
        2. **Form #2 (Nomba Card/Payment Form Redirect):** The response returns a secure checkout session URL. The application redirects the customer's browser to this checkout page, loading **Form #2** (Nomba's hosted card/payment form).
        3. **Redirect / Callback Resolution:** Upon completion of the payment step on **Form #2**:
           - The gateway redirects the user to the specified `callbackUrl` provided in the request payload, appending transaction details.
           - If no custom `callbackUrl` was provided, the platform resolves to the merchant's configured `defaultRedirectUrl` to return the customer to the merchant's storefront.
      operationId: CheckoutController_createOneTimePayment
      parameters:
        - description: Bearer <API_KEY>
          in: header
          name: Authorization
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Checkout session successfully created
        '401':
          description: Unauthorized API key
      summary: Create a one-time checkout session
      tags:
        - developer-apis/checkout
  /api/v1/sessions/{id}/status:
    get:
      description: Enables frontend checkouts or backend applications to poll for session completion status.
      operationId: CheckoutController_getCheckoutSessionStatus
      parameters:
        - description: The unique session ID / transaction ID
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session status retrieved successfully
        '404':
          description: Session not found
      summary: Poll checkout session status
      tags:
        - developer-apis/checkout
  /api/v1/subscribe:
    post:
      description: |
        Generates a checkout session URL to register a customer for a recurring pricing/subscription plan.

        **Sequence Flow & Redirect Hops:**
        1. **API Trigger:** The application calls this endpoint specifying a customer and a subscription plan.
        2. **Form #2 (Nomba Card/Payment Form Redirect):** The response returns a checkout session URL. The customer is redirected to this link to load **Form #2** (Nomba's card input/authorization form) where they authorize their card for recurring charges.
        3. **Redirect / Callback Resolution:** Once the customer authorizes their card or cancels the process:
           - The system redirects the customer to the `callbackUrl` if provided in the session request.
           - If not provided, the flow redirects back using the merchant's fallback `defaultRedirectUrl`.
      operationId: CheckoutController_createSubscriptionPayment
      parameters:
        - description: Bearer <API_KEY>
          in: header
          name: Authorization
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Checkout session successfully created
        '401':
          description: Unauthorized API key
        '404':
          description: Plan not found
      summary: Create a subscription checkout session
      tags:
        - developer-apis/checkout
  /test-api-key:
    get:
      operationId: AppController_testApiKey
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - developer-apis/health
servers: []
tags: []
