components:
  schemas: {}
  securitySchemes:
    bearer:
      bearerFormat: JWT
      scheme: bearer
      type: http
info:
  contact: {}
  description: Deterministic, highly resilient backend infrastructure for the Lemni Payment-as-a-Service (PaaS) engine.
  title: LEMNI PaaS Core Engine API
  version: 1.0.0
openapi: 3.0.0
paths:
  /:
    get:
      operationId: AppController_getHello
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - developer-apis/health
  /admin/api-keys/{id}:
    delete:
      description: Marks the specified API key as inactive immediately, blocking any subsequent API requests using it.
      operationId: AuthController_revokeKey
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: API key successfully revoked
        '401':
          description: Unauthorized JWT session token
        '404':
          description: API key not found or does not belong to the merchant
      security:
        - bearer: []
      summary: Revoke an API key
      tags:
        - merchant-dashboard/api-keys
  /admin/customers:
    post:
      description: Registers a customer under the current merchant, preparing them for subscription charges.
      operationId: BillingController_registerCustomer
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              properties:
                email:
                  example: customer@test.com
                  format: email
                  type: string
                metadata:
                  additionalProperties: true
                  example:
                    companyName: LemonInc
                    department: Support
                  type: object
              required:
                - email
              type: object
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                properties:
                  createdAt:
                    example: '2026-07-04T02:00:00.000Z'
                    format: date-time
                    type: string
                  email:
                    example: customer@test.com
                    format: email
                    type: string
                  id:
                    example: cust_8a9d2ca8b10
                    type: string
                  merchantId:
                    example: merchant-test-123
                    type: string
                  nombaToken:
                    example: null
                    nullable: true
                    type: string
                type: object
          description: Customer successfully registered
        '401':
          description: Unauthorized JWT session token
      security:
        - bearer: []
      summary: Register a customer
      tags:
        - merchant-dashboard/billing
  /admin/plans:
    post:
      description: Registers a new recurring or one-time subscription plan in the system.
      operationId: BillingController_createPlan
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              properties:
                amount:
                  example: 29.99
                  format: float
                  type: number
                billingModel:
                  default: recurring
                  enum:
                    - recurring
                    - one_time
                    - custom_input
                  example: recurring
                  type: string
                gracePeriodDays:
                  default: 0
                  example: 3
                  format: int32
                  type: integer
                interval:
                  enum:
                    - weekly
                    - monthly
                    - yearly
                  example: monthly
                  type: string
                name:
                  example: Standard Subscription Plan
                  type: string
                trialDays:
                  default: 0
                  example: 7
                  format: int32
                  type: integer
                trialRequireCard:
                  default: false
                  example: true
                  type: boolean
              required:
                - name
                - amount
              type: object
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                properties:
                  amount:
                    example: 29.99
                    format: float
                    type: number
                  billingModel:
                    example: recurring
                    type: string
                  gracePeriodDays:
                    example: 3
                    type: integer
                  id:
                    example: plan_7a8dca9
                    type: string
                  interval:
                    example: monthly
                    type: string
                  merchantId:
                    example: merchant-test-123
                    type: string
                  name:
                    example: Standard Subscription Plan
                    type: string
                  trialDays:
                    example: 7
                    type: integer
                  trialRequireCard:
                    example: true
                    type: boolean
                type: object
          description: Plan successfully created
        '401':
          description: Unauthorized JWT session token
      security:
        - bearer: []
      summary: Create a billing plan
      tags:
        - merchant-dashboard/billing
  /admin/plans/{id}:
    delete:
      description: Removes a subscription plan if no active or trialing customers are attached to it.
      operationId: BillingController_deletePlan
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Plan successfully deleted
        '400':
          description: Cannot delete plan due to active subscriptions
        '401':
          description: Unauthorized JWT session token
        '404':
          description: Plan not found
      security:
        - bearer: []
      summary: Delete a billing plan
      tags:
        - merchant-dashboard/billing
  /admin/subscriptions/{id}/reactivate:
    post:
      description: Resets the billing cycle start date and shifts the subscription back to active status.
      operationId: BillingController_reactivateSubscription
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  createdAt:
                    example: '2026-07-04T02:00:00.000Z'
                    format: date-time
                    type: string
                  currentPeriodEnd:
                    example: '2026-08-04T02:00:00.000Z'
                    format: date-time
                    type: string
                  customerId:
                    example: cust_8a9d2ca8b10
                    type: string
                  id:
                    example: sub_a28deca9
                    type: string
                  planId:
                    example: plan_7a8dca9
                    type: string
                  status:
                    example: active
                    type: string
                  trialEnd:
                    example: null
                    format: date-time
                    nullable: true
                    type: string
                type: object
          description: Subscription successfully reactivated
        '400':
          description: Subscription is not canceled or card is missing
        '401':
          description: Unauthorized JWT session token
        '404':
          description: Subscription or associated plan not found
      security:
        - bearer: []
      summary: Reactivate a canceled subscription
      tags:
        - merchant-dashboard/billing
  /api/v1/checkout/plans/{planId}/sessions:
    post:
      description: Allows off-the-shelf payment links to initialize checkout sessions for customer emails.
      operationId: CheckoutController_createPublicPlanSession
      parameters:
        - description: The static pricing plan ID
          in: path
          name: planId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                callbackUrl:
                  example: https://mywebsite.com/public-success
                  format: uri
                  type: string
                email:
                  example: buyer@gmail.com
                  format: email
                  type: string
              required:
                - email
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  checkoutUrl:
                    example: https://checkout.nomba.com/pay/mock_link_123
                    format: uri
                    type: string
                  sessionId:
                    example: tx_1234567890abcdef
                    type: string
                  subscriptionId:
                    example: sub_a28deca9
                    type: string
                type: object
          description: Checkout session generated
        '404':
          description: Plan not found
      summary: Generate public plan checkout session
      tags:
        - developer-apis/checkout
  /api/v1/pay:
    post:
      description: Generates a payment URL for a singular checkout charge.
      operationId: CheckoutController_createOneTimePayment
      parameters:
        - description: Bearer <API_KEY>
          in: header
          name: Authorization
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                amount:
                  example: 5000
                  format: float
                  type: number
                callbackUrl:
                  example: https://mywebsite.com/payment-success
                  format: uri
                  type: string
                email:
                  example: payer@test.com
                  format: email
                  type: string
              required:
                - amount
                - email
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  checkoutUrl:
                    example: https://checkout.nomba.com/pay/mock_link_123
                    format: uri
                    type: string
                  sessionId:
                    example: tx_1234567890abcdef
                    type: string
                type: object
          description: Checkout session successfully created
        '401':
          description: Unauthorized API key
      summary: Create a one-time checkout session
      tags:
        - developer-apis/checkout
  /api/v1/sessions/{id}/status:
    get:
      description: Enables frontend checkouts or backend applications to poll for session completion status.
      operationId: CheckoutController_getCheckoutSessionStatus
      parameters:
        - description: The unique session ID / transaction ID
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  amount:
                    example: 5000
                    format: float
                    type: number
                  createdAt:
                    example: '2026-07-04T02:00:00.000Z'
                    format: date-time
                    type: string
                  nombaRef:
                    example: ref_nomba_992c
                    nullable: true
                    type: string
                  sessionId:
                    example: tx_1234567890abcdef
                    type: string
                  status:
                    enum:
                      - pending
                      - success
                      - failed
                    example: pending
                    type: string
                type: object
          description: Session status retrieved successfully
        '404':
          description: Session not found
      summary: Poll checkout session status
      tags:
        - developer-apis/checkout
  /api/v1/subscribe:
    post:
      description: Generates a payment URL to register a customer to a recurring pricing plan.
      operationId: CheckoutController_createSubscriptionPayment
      parameters:
        - description: Bearer <API_KEY>
          in: header
          name: Authorization
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                callbackUrl:
                  example: https://mywebsite.com/sub-success
                  format: uri
                  type: string
                email:
                  example: subscriber@test.com
                  format: email
                  type: string
                planId:
                  example: plan_7a8dca9
                  type: string
              required:
                - planId
                - email
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  checkoutUrl:
                    example: https://checkout.nomba.com/pay/mock_link_123
                    format: uri
                    type: string
                  sessionId:
                    example: tx_1234567890abcdef
                    type: string
                  subscriptionId:
                    example: sub_a28deca9
                    type: string
                type: object
          description: Checkout session successfully created
        '401':
          description: Unauthorized API key
        '404':
          description: Plan not found
      summary: Create a subscription checkout session
      tags:
        - developer-apis/checkout
  /test-api-key:
    get:
      operationId: AppController_testApiKey
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - developer-apis/health
servers: []
tags: []
