components:
  schemas: {}
  securitySchemes:
    bearer:
      bearerFormat: JWT
      scheme: bearer
      type: http
info:
  contact: {}
  description: Deterministic, highly resilient backend infrastructure for the Lemni Payment-as-a-Service (PaaS) engine.
  title: LEMNI PaaS Core Engine API
  version: 1.0.0
openapi: 3.0.0
paths:
  /:
    get:
      operationId: AppController_getHello
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - developer-apis/health
  /admin/api-keys:
    get:
      description: Returns a list of API keys with their metadata (without the secret)
      operationId: ApiKeysController_listKeys
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                example:
                  - createdAt: '2026-07-04T10:00:00Z'
                    environment: test
                    id: abc123def456
                    isActive: true
          description: API keys retrieved
        '401':
          description: Unauthorized JWT session token
      security:
        - bearer: []
      summary: List all API keys for the merchant
      tags:
        - merchant-dashboard/api-keys
    post:
      description: Creates and returns a new API key. Store it securely - you will not see it again.
      operationId: ApiKeysController_generateKey
      parameters: []
      responses:
        '201':
          content:
            application/json:
              schema:
                example:
                  keyId: abc123def456
                  message: Store this key safely. You will not be able to see it again.
                  rawKey: sk_test_abc123def456_xyz789abc123def456xyz789abc123
          description: API key successfully generated
        '401':
          description: Unauthorized JWT session token
      security:
        - bearer: []
      summary: Generate a new API key
      tags:
        - merchant-dashboard/api-keys
  /admin/api-keys/{id}:
    delete:
      description: Marks the specified API key as inactive immediately, blocking any subsequent API requests using it.
      operationId: ApiKeysController_revokeKey
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: API key successfully revoked
        '401':
          description: Unauthorized JWT session token
        '404':
          description: API key not found or does not belong to the merchant
      security:
        - bearer: []
      summary: Revoke an API key
      tags:
        - merchant-dashboard/api-keys
  /admin/customers:
    post:
      description: Registers a customer under the current merchant, preparing them for subscription charges.
      operationId: BillingController_registerCustomer
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              properties:
                email:
                  example: customer@test.com
                  format: email
                  type: string
                metadata:
                  additionalProperties: true
                  example:
                    companyName: LemonInc
                    department: Support
                  type: object
              required:
                - email
              type: object
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                properties:
                  createdAt:
                    example: '2026-07-04T02:00:00.000Z'
                    format: date-time
                    type: string
                  email:
                    example: customer@test.com
                    format: email
                    type: string
                  id:
                    example: cust_8a9d2ca8b10
                    type: string
                  merchantId:
                    example: merchant-test-123
                    type: string
                  nombaToken:
                    example: null
                    nullable: true
                    type: string
                type: object
          description: Customer successfully registered
        '401':
          description: Unauthorized JWT session token
      security:
        - bearer: []
      summary: Register a customer
      tags:
        - merchant-dashboard/billing
  /admin/dlq:
    get:
      description: >-
        Returns all jobs that have been moved to the Dead Letter Queue after exhausting their retry attempts. Each entry
        includes the full payload, error reason, retry history, and failure timestamp.
      operationId: DlqController_listDlq
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  properties:
                    errorReason:
                      example: Grace period exhausted after 3 retries
                      type: string
                    failedAt:
                      example: '2026-07-04T02:00:00.000Z'
                      format: date-time
                      type: string
                    id:
                      example: dlq-sub_a28deca9-1720051200000
                      type: string
                    payload:
                      properties:
                        amount:
                          example: 29.99
                          format: float
                          type: number
                        customerId:
                          example: cust_8a9d2ca8b10
                          type: string
                        merchantId:
                          example: merchant-test-123
                          type: string
                        planId:
                          example: plan_7a8dca9
                          type: string
                        retryCount:
                          example: 3
                          format: int32
                          type: integer
                        subscriptionId:
                          example: sub_a28deca9
                          type: string
                      type: object
                    retryHistory:
                      items:
                        properties:
                          attempt:
                            example: 3
                            format: int32
                            type: integer
                          failedAt:
                            example: '2026-07-04T02:00:00.000Z'
                            format: date-time
                            type: string
                          reason:
                            example: card_declined
                            type: string
                        type: object
                      type: array
                    subscriptionId:
                      example: sub_a28deca9
                      nullable: true
                      type: string
                  type: object
                type: array
          description: DLQ entries returned successfully
        '401':
          description: Unauthorized JWT session token
      security:
        - bearer: []
      summary: List dead letter queue jobs
      tags:
        - merchant-dashboard/dlq
  /admin/dlq/{jobId}/replay:
    post:
      description: >-
        Re-enqueues a specific DLQ job back into the ChargeQueue for retry. The DLQ entry is removed after successful
        re-enqueue. Use this after resolving the root cause (e.g., updating card details).
      operationId: DlqController_replayDlqJob
      parameters:
        - description: The DLQ job ID to replay
          in: path
          name: jobId
          required: true
          schema:
            example: dlq-sub_a28deca9-1720051200000
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  enqueued:
                    example: true
                    type: boolean
                  jobId:
                    example: dlq-sub_a28deca9-1720051200000
                    type: string
                type: object
          description: Job re-enqueued successfully
        '401':
          description: Unauthorized JWT session token
        '404':
          description: DLQ job not found
      security:
        - bearer: []
      summary: Replay a dead letter queue job
      tags:
        - merchant-dashboard/dlq
  /admin/plans:
    post:
      description: Registers a new recurring or one-time subscription plan in the system.
      operationId: BillingController_createPlan
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              properties:
                amount:
                  example: 29.99
                  format: float
                  type: number
                billingModel:
                  default: recurring
                  enum:
                    - recurring
                    - one_time
                    - custom_input
                  example: recurring
                  type: string
                gracePeriodDays:
                  default: 0
                  example: 3
                  format: int32
                  type: integer
                interval:
                  enum:
                    - weekly
                    - monthly
                    - yearly
                  example: monthly
                  type: string
                name:
                  example: Standard Subscription Plan
                  type: string
                trialDays:
                  default: 0
                  example: 7
                  format: int32
                  type: integer
                trialRequireCard:
                  default: false
                  example: true
                  type: boolean
              required:
                - name
                - amount
              type: object
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                properties:
                  amount:
                    example: 29.99
                    format: float
                    type: number
                  billingModel:
                    example: recurring
                    type: string
                  gracePeriodDays:
                    example: 3
                    type: integer
                  id:
                    example: plan_7a8dca9
                    type: string
                  interval:
                    example: monthly
                    type: string
                  merchantId:
                    example: merchant-test-123
                    type: string
                  name:
                    example: Standard Subscription Plan
                    type: string
                  trialDays:
                    example: 7
                    type: integer
                  trialRequireCard:
                    example: true
                    type: boolean
                type: object
          description: Plan successfully created
        '401':
          description: Unauthorized JWT session token
      security:
        - bearer: []
      summary: Create a billing plan
      tags:
        - merchant-dashboard/billing
  /admin/plans/{id}:
    delete:
      description: Removes a subscription plan if no active or trialing customers are attached to it.
      operationId: BillingController_deletePlan
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Plan successfully deleted
        '400':
          description: Cannot delete plan due to active subscriptions
        '401':
          description: Unauthorized JWT session token
        '404':
          description: Plan not found
      security:
        - bearer: []
      summary: Delete a billing plan
      tags:
        - merchant-dashboard/billing
  /admin/subscriptions/{id}/reactivate:
    post:
      description: Resets the billing cycle start date and shifts the subscription back to active status.
      operationId: BillingController_reactivateSubscription
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  createdAt:
                    example: '2026-07-04T02:00:00.000Z'
                    format: date-time
                    type: string
                  currentPeriodEnd:
                    example: '2026-08-04T02:00:00.000Z'
                    format: date-time
                    type: string
                  customerId:
                    example: cust_8a9d2ca8b10
                    type: string
                  id:
                    example: sub_a28deca9
                    type: string
                  planId:
                    example: plan_7a8dca9
                    type: string
                  status:
                    example: active
                    type: string
                  trialEnd:
                    example: null
                    format: date-time
                    nullable: true
                    type: string
                type: object
          description: Subscription successfully reactivated
        '400':
          description: Subscription is not canceled or card is missing
        '401':
          description: Unauthorized JWT session token
        '404':
          description: Subscription or associated plan not found
      security:
        - bearer: []
      summary: Reactivate a canceled subscription
      tags:
        - merchant-dashboard/billing
  /api/v1/checkout/plans/{planId}/sessions:
    post:
      description: Allows off-the-shelf payment links to initialize checkout sessions for customer emails.
      operationId: CheckoutController_createPublicPlanSession
      parameters:
        - description: The static pricing plan ID
          in: path
          name: planId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                callbackUrl:
                  example: https://mywebsite.com/public-success
                  format: uri
                  type: string
                email:
                  example: buyer@gmail.com
                  format: email
                  type: string
              required:
                - email
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  checkoutUrl:
                    example: https://checkout.nomba.com/pay/mock_link_123
                    format: uri
                    type: string
                  sessionId:
                    example: tx_1234567890abcdef
                    type: string
                  subscriptionId:
                    example: sub_a28deca9
                    type: string
                type: object
          description: Checkout session generated
        '404':
          description: Plan not found
      summary: Generate public plan checkout session
      tags:
        - developer-apis/checkout
  /api/v1/pay:
    post:
      description: Generates a payment URL for a singular checkout charge.
      operationId: CheckoutController_createOneTimePayment
      parameters:
        - description: Bearer <API_KEY>
          in: header
          name: Authorization
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                amount:
                  example: 5000
                  format: float
                  type: number
                callbackUrl:
                  example: https://mywebsite.com/payment-success
                  format: uri
                  type: string
                email:
                  example: payer@test.com
                  format: email
                  type: string
              required:
                - amount
                - email
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  checkoutUrl:
                    example: https://checkout.nomba.com/pay/mock_link_123
                    format: uri
                    type: string
                  sessionId:
                    example: tx_1234567890abcdef
                    type: string
                type: object
          description: Checkout session successfully created
        '401':
          description: Unauthorized API key
      summary: Create a one-time checkout session
      tags:
        - developer-apis/checkout
  /api/v1/sessions/{id}/status:
    get:
      description: Enables frontend checkouts or backend applications to poll for session completion status.
      operationId: CheckoutController_getCheckoutSessionStatus
      parameters:
        - description: The unique session ID / transaction ID
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  amount:
                    example: 5000
                    format: float
                    type: number
                  createdAt:
                    example: '2026-07-04T02:00:00.000Z'
                    format: date-time
                    type: string
                  nombaRef:
                    example: ref_nomba_992c
                    nullable: true
                    type: string
                  sessionId:
                    example: tx_1234567890abcdef
                    type: string
                  status:
                    enum:
                      - pending
                      - success
                      - failed
                    example: pending
                    type: string
                type: object
          description: Session status retrieved successfully
        '404':
          description: Session not found
      summary: Poll checkout session status
      tags:
        - developer-apis/checkout
  /api/v1/subscribe:
    post:
      description: Generates a payment URL to register a customer to a recurring pricing plan.
      operationId: CheckoutController_createSubscriptionPayment
      parameters:
        - description: Bearer <API_KEY>
          in: header
          name: Authorization
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                callbackUrl:
                  example: https://mywebsite.com/sub-success
                  format: uri
                  type: string
                email:
                  example: subscriber@test.com
                  format: email
                  type: string
                planId:
                  example: plan_7a8dca9
                  type: string
              required:
                - planId
                - email
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  checkoutUrl:
                    example: https://checkout.nomba.com/pay/mock_link_123
                    format: uri
                    type: string
                  sessionId:
                    example: tx_1234567890abcdef
                    type: string
                  subscriptionId:
                    example: sub_a28deca9
                    type: string
                type: object
          description: Checkout session successfully created
        '401':
          description: Unauthorized API key
        '404':
          description: Plan not found
      summary: Create a subscription checkout session
      tags:
        - developer-apis/checkout
  /api/v1/webhooks/nomba:
    post:
      description: Verifies the Nomba signature and updates the matching transaction/subscription state accordingly.
      operationId: WebhookController_handleNombaWebhook
      parameters: []
      responses:
        '200':
          description: Event processed, ignored, orphaned, or deduplicated
        '401':
          description: Signature verification failed
      summary: Receive Nomba payment webhook events
      tags:
        - developer-apis/webhooks
  /auth/login:
    post:
      description: Returns access token (1h) and refresh token (7d)
      operationId: AuthController_login
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                example:
                  accessToken: eyJhbG...
                  merchant:
                    email: test@example.com
                    id: uuid
                    name: Acme
                  refreshToken: eyJhbG...
          description: Login successful
        '401':
          description: Invalid credentials
      summary: Authenticate merchant and receive JWT tokens
      tags:
        - auth
  /auth/logout:
    post:
      description: Server-side logout - client should discard tokens
      operationId: AuthController_logout
      parameters: []
      responses:
        '200':
          description: Logged out successfully
      security:
        - bearer: []
      summary: Logout (token invalidation on client)
      tags:
        - auth
  /auth/refresh:
    post:
      description: Returns a new access token (1h)
      operationId: AuthController_refresh
      parameters: []
      responses:
        '200':
          description: Token refreshed
        '401':
          description: Invalid refresh token
      summary: Refresh access token using refresh token
      tags:
        - auth
  /auth/signup:
    post:
      description: Create a new merchant account with email and password
      operationId: AuthController_signup
      parameters: []
      responses:
        '201':
          description: Merchant successfully registered
        '400':
          description: Invalid input
        '409':
          description: Email already registered
      summary: Register a new merchant account
      tags:
        - auth
  /test-api-key:
    get:
      operationId: AppController_testApiKey
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - developer-apis/health
servers: []
tags: []
